<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>To-Do List</h1>

<form action="/add" method="POST">
    <input type="text" name="task" placeholder="Enter Task" required>

    <input type="date" name="date">

    <input type="time" name="time">

    <button>Add Task</button>
</form>

<hr>

{% for task in tasks %}

<div class="task">

{% if task[4]==1 %}
<h3><strike>{{task[1]}}</strike></h3>
{% else %}
<h3>{{task[1]}}</h3>
{% endif %}

<p>Date : {{task[2]}}</p>

<p>Time : {{task[3]}}</p>

{% if task[4]==0 %}
<a href="/complete/{{task[0]}}">Complete</a>
{% endif %}

<a href="/delete/{{task[0]}}">Delete</a>

<form action="/edit/{{task[0]}}" method="POST">

<input type="text" name="task" value="{{task[1]}}">

<input type="date" name="date" value="{{task[2]}}">

<input type="time" name="time" value="{{task[3]}}">

<button>Update</button>

</form>

</div>

<hr>

{% endfor %}

</body>
</html>
